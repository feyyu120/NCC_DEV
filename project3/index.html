<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCC Todo - Focus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-check-circle"></i>Todo-List</h1>
            <p>Add Your Tasks Here</p>
        </header>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="What needs to be done today?">
            <button id="addBtn">
                <i class="fas fa-plus"></i> Add
            </button>
        </div>

        <div class="stats">
            <span id="totalTasks">0 tasks</span>
            <span id="completedTasks">0 completed</span>
        </div>

        <!-- Scrollable Task List -->
        <ul id="taskList"></ul>

        <footer>
            <button id="clearCompleted" class="clear-btn">
                <i class="fas fa-trash"></i> Clear Completed
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
